<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#181c38"/>
      <stop offset="100%" stop-color="#0f1120"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="40%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#16192e"/>
      <stop offset="100%" stop-color="#090b18"/>
    </radialGradient>
    <radialGradient id="label" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#c0acff"/>
      <stop offset="38%"  stop-color="#8a6de0"/>
      <stop offset="70%"  stop-color="#6245b8"/>
      <stop offset="100%" stop-color="#46308e"/>
    </radialGradient>
    <radialGradient id="sheen" cx="33%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Vinyl disc -->
  <circle cx="32" cy="32" r="28" fill="url(#vinyl)"/>

  <!-- Groove rings -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#252a45" stroke-width="0.7" opacity="0.85"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="#252a45" stroke-width="0.6" opacity="0.70"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#252a45" stroke-width="0.6" opacity="0.60"/>

  <!-- Outer rim highlight -->
  <circle cx="32" cy="32" r="27.5" fill="none" stroke="#6670a0" stroke-width="0.8" opacity="0.30"/>

  <!-- Surface sheen -->
  <circle cx="32" cy="32" r="28" fill="url(#sheen)"/>

  <!-- Centre label -->
  <circle cx="32" cy="32" r="13" fill="url(#label)"/>
  <circle cx="32" cy="32" r="13" fill="url(#sheen)"/>
  <circle cx="32" cy="32" r="12.5" fill="none" stroke="#c4b0ff" stroke-width="0.6" opacity="0.25"/>
</svg>
